<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TemanKreatif | Portofolio Desain</title>
    <style>
        /* Ini adalah CSS untuk mempercantik tampilan (UI/UX) */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; background-color: #f9fafb; color: #1f2937; 
        }
        header { 
            background-color: #111827; color: #f9fafb; 
            padding: 4rem 2rem; text-align: center; 
        }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px;}
        header p { color: #9ca3af; margin-top: 10px; font-size: 1.1rem; }
        
        .container { max-width: 1100px; margin: 3rem auto; padding: 0 1rem; }
        
        /* Grid untuk menampilkan desainmu */
        .portfolio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 2rem; 
        }
        .card { 
            background: #ffffff; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s ease; 
        }
        .card:hover { transform: translateY(-10px); }
        .card img { 
            width: 100%; height: 250px; object-fit: cover; background-color: #e5e7eb; 
        }
        .card-content { padding: 1.5rem; }
        .card-content h3 { margin: 0 0 10px 0; color: #111827; }
        .card-content p { margin: 0; color: #6b7280; font-size: 0.95rem; }
    </style>
</head>
<body>

    <header>
        <h1>TemanKreatif</h1>
        <p>Graphic Designer & Web Designer</p>
    </header>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Karya Terbaru Saya</h2>
        
        <div class="portfolio-grid">
            <div class="card">
                <img src="https://via.placeholder.com/400x300?text=Desain+Poster" alt="Karya Desain 1">
                <div class="card-content">
                    <h3>Desain Social Media</h3>
                    <p>Konsep visual untuk kampanye digital marketing.</p>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/400x300?text=UI/UX+Design" alt="Karya Desain 2">
                <div class="card-content">
                    <h3>Redesign Website Client</h3>
                    <p>Fokus pada perbaikan UI/UX dan kemudahan navigasi.</p>
                </div>
            </div>
            
            <div class="card">
                <img src="https://via.placeholder.com/400x300?text=Logo+Brand" alt="Karya Desain 3">
                <div class="card-content">
                    <h3>Branding Identity</h3>
                    <p>Pembuatan logo dan pedoman visual untuk UMKM.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
